<!DOCTYPE html>
<html>
<head>
    <title>API测试</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>API测试页面</h1>
    <button onclick="testThingList()">测试 /api/thing/list</button>
    <button onclick="testClassificationList()">测试 /api/classification/list</button>
    <button onclick="testTagList()">测试 /api/tag/list</button>
    <pre id="result"></pre>

    <script>
        async function testThingList() {
            try {
                const response = await fetch('http://localhost:9100/api/thing/list');
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('Thing List:', data);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }

        async function testClassificationList() {
            try {
                const response = await fetch('http://localhost:9100/api/classification/list');
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('Classification List:', data);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }

        async function testTagList() {
            try {
                const response = await fetch('http://localhost:9100/api/tag/list');
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('Tag List:', data);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
