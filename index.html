<!DOCTYPE html>
<html lang="zh-CN" id="html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>java家政网站演示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* 修复Message组件z-index问题 */
      .ant-message {
        z-index: 9999 !important;
        position: fixed !important;
        top: 24px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
      }
      
      .ant-message-notice {
        padding: 12px 24px !important;
      }
      
      .ant-message-notice-content {
        background: #ffffff !important;
        border-radius: 16px !important;
        box-shadow: 0 8px 32px rgba(102, 187, 106, 0.2) !important;
        padding: 14px 24px !important;
        font-size: 14px !important;
        border: 1px solid rgba(102, 187, 106, 0.2) !important;
      }
      
      /* Success消息样式 */
      .ant-message-success .anticon {
        color: #66BB6A !important;
      }
      
      .ant-message-success .ant-message-notice-content {
        background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 100%) !important;
        border-color: #81C784 !important;
        color: #2E7D32 !important;
      }
      
      /* Error消息样式 */
      .ant-message-error .anticon {
        color: #EF5350 !important;
      }
      
      .ant-message-error .ant-message-notice-content {
        background: linear-gradient(135deg, #FFEBEE 0%, #FCE4EC 100%) !important;
        border-color: #EF5350 !important;
        color: #C62828 !important;
      }
      
      /* Warning消息样式 */
      .ant-message-warning .anticon {
        color: #FFA726 !important;
      }
      
      .ant-message-warning .ant-message-notice-content {
        background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%) !important;
        border-color: #FFB74D !important;
        color: #E65100 !important;
      }
      
      /* Info消息样式 */
      .ant-message-info .anticon {
        color: #4DB6AC !important;
      }
      
      .ant-message-info .ant-message-notice-content {
        background: linear-gradient(135deg, #E0F2F1 0%, #B2DFDB 100%) !important;
        border-color: #4DB6AC !important;
        color: #00695C !important;
      }
      
      /* 自定义滚动条样式 - 绿色主题 */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: rgba(232, 245, 233, 0.3);
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #66BB6A 0%, #4DB6AC 100%);
        border-radius: 5px;
        transition: all 0.3s ease;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #5CB860 0%, #45A89E 100%);
        box-shadow: 0 0 6px rgba(102, 187, 106, 0.5);
      }
      
      ::-webkit-scrollbar-thumb:active {
        background: linear-gradient(135deg, #4CAF50 0%, #3D9B96 100%);
      }
      
      /* Firefox滚动条样式 */
      * {
        scrollbar-width: thin;
        scrollbar-color: #66BB6A rgba(232, 245, 233, 0.3);
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
